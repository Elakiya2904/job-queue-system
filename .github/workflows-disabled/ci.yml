name: 🔄 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Backend Testing and Linting
  backend-tests:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 📥 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov black flake8 isort

    - name: 🔍 Lint with flake8
      run: |
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: 🎨 Check code formatting with black
      run: black --check app/

    - name: 📝 Check import sorting with isort
      run: isort --check-only app/

    - name: 🗄️ Set up test database
      run: |
        export DATABASE_URL="sqlite:///./test_job_queue.db"
        python setup_db.py --create-tables

    - name: 🧪 Run tests with pytest
      run: |
        export DATABASE_URL="sqlite:///./test_job_queue.db"
        export SECRET_KEY="test-secret-key-for-github-actions"
        pytest --cov=app --cov-report=xml --cov-report=term-missing

    - name: 📊 Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./backend/coverage.xml
        flags: backend
        name: backend-coverage

  # Frontend Testing and Building
  frontend-tests:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json

    - name: 📥 Install dependencies
      run: npm ci

    - name: 🔍 Lint with ESLint
      run: npm run lint

    - name: 🎨 Check code formatting with Prettier
      run: npm run format:check

    - name: 🏗️ Build Next.js application
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:8001

    - name: 🧪 Run tests
      run: npm test -- --watchAll=false --coverage

    - name: 📊 Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # Docker Build Test
  docker-build:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🏗️ Build backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: false
        tags: job-queue-backend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: 🏗️ Build frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: false
        tags: job-queue-frontend:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Security Scanning
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🔒 Run Bandit security scan
      run: |
        pip install bandit[toml]
        bandit -r backend/app/ -f json -o bandit-report.json

    - name: 📦 Setup Node.js for audit
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json

    - name: 🔍 Run npm audit
      working-directory: ./frontend
      run: npm audit --audit-level=high

    - name: 📤 Upload security artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          frontend/npm-audit.json

  # Database Migration Test
  migration-test:
    name: 🗄️ Database Migration Test
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📥 Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔄 Test Alembic migrations
      working-directory: ./backend
      run: |
        export DATABASE_URL="sqlite:///./migration_test.db"
        alembic upgrade head
        alembic check

  # Deployment Readiness Check
  deployment-check:
    name: 🚀 Deployment Readiness
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [backend-tests, frontend-tests, docker-build, security-scan, migration-test]

    steps:
    - name: ✅ Mark deployment ready
      run: |
        echo "🎉 All checks passed! Ready for deployment to AWS"
        echo "📊 Backend tests: ✅"
        echo "⚛️ Frontend tests: ✅" 
        echo "🐳 Docker builds: ✅"
        echo "🔒 Security scans: ✅"
        echo "🗄️ Database migrations: ✅"

    - name: 🔔 Slack notification
      if: github.event_name == 'push'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ ! -z "$SLACK_WEBHOOK_URL" ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚀 Job Queue System: Ready for AWS deployment! All CI checks passed."}' \
            $SLACK_WEBHOOK_URL
        fi

  # Create Release
  create-release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [deployment-check]
    
    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🏷️ Generate version tag
      id: version
      run: |
        # Get last tag or start with v1.0.0
        LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
        echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
        
        # Generate new version (increment patch)
        NEW_VERSION=$(echo $LAST_TAG | awk -F. '{$NF = $NF + 1;} 1' | sed 's/ /./g')
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: 📝 Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.new_version }}
        release_name: 🚀 Release ${{ steps.version.outputs.new_version }}
        body: |
          ## 🎉 What's New
          
          **Production-Ready Job Queue System Release**
          
          ### ✨ Features
          - ✅ FastAPI backend with JWT authentication
          - ✅ Next.js frontend with real-time monitoring  
          - ✅ Race condition protection validated
          - ✅ Comprehensive error handling
          - ✅ AWS migration ready
          
          ### 🔄 CI/CD
          - ✅ All tests passed
          - ✅ Security scans completed
          - ✅ Docker builds successful
          - ✅ Database migrations tested
          
          ### 📋 Deployment
          Ready for AWS deployment with SQS, Lambda, and CloudWatch integration.
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.version.outputs.last_tag }}...${{ steps.version.outputs.new_version }}
        draft: false
        prerelease: false