name: 🔒 Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Python Security Scanning
  python-security:
    name: 🐍 Python Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit[toml] safety pip-audit semgrep

    - name: 🔍 Run Bandit security linter
      working-directory: ./backend
      run: |
        bandit -r app/ -f json -o ../bandit-report.json
        bandit -r app/ -f txt
      continue-on-error: true

    - name: 🛡️ Run Safety vulnerability check
      working-directory: ./backend
      run: |
        pip install -r requirements.txt
        safety check --json --output ../safety-report.json
        safety check
      continue-on-error: true

    - name: 🔎 Run pip-audit
      working-directory: ./backend
      run: |
        pip-audit --desc --output ../pip-audit-report.json --format=json
        pip-audit --desc
      continue-on-error: true

    - name: 🔍 Run Semgrep static analysis
      run: |
        semgrep --config=auto backend/app/ --json --output=semgrep-report.json
        semgrep --config=auto backend/app/
      continue-on-error: true

    - name: 📤 Upload Python security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: python-security-reports
        path: |
          bandit-report.json
          safety-report.json
          pip-audit-report.json
          semgrep-report.json

  # Node.js Security Scanning
  nodejs-security:
    name: ⚛️ Node.js Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json

    - name: 📥 Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: 🔍 Run npm audit
      working-directory: ./frontend
      run: |
        npm audit --audit-level=moderate --json > ../npm-audit-report.json
        npm audit --audit-level=moderate
      continue-on-error: true

    - name: 📦 Install audit tools
      run: |
        npm install -g audit-ci retire

    - name: 🔎 Run retire.js vulnerability scan
      working-directory: ./frontend
      run: |
        retire --outputformat json --outputpath ../retire-report.json .
        retire --outputformat text .
      continue-on-error: true

    - name: 📤 Upload Node.js security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: nodejs-security-reports
        path: |
          npm-audit-report.json
          retire-report.json

  # Docker Security Scanning
  docker-security:
    name: 🐳 Docker Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔒 Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install trivy

    - name: 🏗️ Build backend Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        tags: job-queue-backend:security-scan
        load: true

    - name: 🔍 Scan backend Docker image
      run: |
        trivy image --format json --output backend-docker-scan.json job-queue-backend:security-scan
        trivy image job-queue-backend:security-scan
      continue-on-error: true

    - name: 🏗️ Build frontend Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        tags: job-queue-frontend:security-scan
        load: true

    - name: 🔍 Scan frontend Docker image
      run: |
        trivy image --format json --output frontend-docker-scan.json job-queue-frontend:security-scan
        trivy image job-queue-frontend:security-scan
      continue-on-error: true

    - name: 📤 Upload Docker security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: docker-security-reports
        path: |
          backend-docker-scan.json
          frontend-docker-scan.json

  # Infrastructure Security (Checkov)
  infrastructure-security:
    name: 🏗️ Infrastructure Security
    runs-on: ubuntu-latest

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python for Checkov
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Install Checkov
      run: |
        pip install checkov

    - name: 🔍 Run Checkov on Docker files
      run: |
        checkov -f backend/Dockerfile --framework dockerfile --output json > dockerfile-security-backend.json
        checkov -f backend/Dockerfile --framework dockerfile
      continue-on-error: true

    - name: 🔍 Run Checkov on AWS infrastructure
      run: |
        if [ -d "aws/infrastructure" ]; then
          checkov -d aws/infrastructure --framework cloudformation --output json > aws-infrastructure-security.json
          checkov -d aws/infrastructure --framework cloudformation
        fi
      continue-on-error: true

    - name: 📤 Upload infrastructure security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: infrastructure-security-reports
        path: |
          dockerfile-security-backend.json
          aws-infrastructure-security.json

  # Secret Scanning
  secret-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 📦 Install TruffleHog
      run: |
        curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

    - name: 🔍 Run TruffleHog secret scan
      run: |
        trufflehog git file://. --json > trufflehog-report.json
        trufflehog git file://. --fail
      continue-on-error: true

    - name: 📤 Upload secret scan report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: secret-scan-report
        path: trufflehog-report.json

  # License Compliance
  license-compliance:
    name: 📜 License Compliance
    runs-on: ubuntu-latest

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: 🔍 Check Python licenses
      working-directory: ./backend
      run: |
        pip install pip-licenses
        pip install -r requirements.txt
        pip-licenses --format=json --output-file=../python-licenses.json
        pip-licenses --format=table
        
        # Check for problematic licenses
        pip-licenses --format=json | jq -r '.[] | select(.License | test("GPL|AGPL|SSPL"; "i")) | "\(.Name): \(.License)"' > problematic-licenses.txt
        if [ -s problematic-licenses.txt ]; then
          echo "⚠️ Found potentially problematic licenses:"
          cat problematic-licenses.txt
        fi

    - name: 🔍 Check Node.js licenses
      working-directory: ./frontend
      run: |
        npm ci
        npx license-checker --json --out ../nodejs-licenses.json
        npx license-checker
        
        # Check for problematic licenses
        npx license-checker --onlyAllow 'MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;Unlicense' --excludePrivatePackages || echo "⚠️ Found potentially problematic licenses in Node.js dependencies"

    - name: 📤 Upload license reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: license-reports
        path: |
          python-licenses.json
          nodejs-licenses.json
          problematic-licenses.txt

  # Security Report Summary
  security-summary:
    name: 📊 Security Summary
    runs-on: ubuntu-latest
    needs: [python-security, nodejs-security, docker-security, infrastructure-security, secret-scan, license-compliance]
    if: always()

    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 📥 Download all security reports
      uses: actions/download-artifact@v3
      with:
        path: security-reports

    - name: 📊 Generate security summary
      run: |
        echo "# 🔒 Security Scan Summary" > security-summary.md
        echo "" >> security-summary.md
        echo "Generated on: $(date)" >> security-summary.md
        echo "" >> security-summary.md
        
        # Check scan statuses
        echo "## 📋 Scan Results" >> security-summary.md
        echo "" >> security-summary.md
        echo "| Security Check | Status |" >> security-summary.md
        echo "|---|---|" >> security-summary.md
        echo "| Python Security | ${{ needs.python-security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> security-summary.md
        echo "| Node.js Security | ${{ needs.nodejs-security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> security-summary.md
        echo "| Docker Security | ${{ needs.docker-security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> security-summary.md
        echo "| Infrastructure Security | ${{ needs.infrastructure-security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> security-summary.md
        echo "| Secret Scan | ${{ needs.secret-scan.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> security-summary.md
        echo "| License Compliance | ${{ needs.license-compliance.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> security-summary.md
        echo "" >> security-summary.md
        
        # Add recommendations
        echo "## 🛡️ Security Recommendations" >> security-summary.md
        echo "" >> security-summary.md
        echo "- 🔄 Keep dependencies updated regularly" >> security-summary.md
        echo "- 🔒 Review security reports for critical vulnerabilities" >> security-summary.md
        echo "- 🔐 Ensure no secrets are committed to version control" >> security-summary.md
        echo "- 📝 Review license compliance for legal requirements" >> security-summary.md
        echo "- 🐳 Regularly update base Docker images" >> security-summary.md
        
        # Add AWS security best practices
        echo "" >> security-summary.md
        echo "## ☁️ AWS Security Checklist" >> security-summary.md
        echo "- 🔐 Use IAM roles instead of access keys where possible" >> security-summary.md
        echo "- 🔒 Enable MFA on all AWS accounts" >> security-summary.md
        echo "- 📊 Enable CloudTrail for audit logging" >> security-summary.md
        echo "- 🛡️ Configure VPC security groups with least privilege" >> security-summary.md
        echo "- 🔑 Use AWS Secrets Manager for sensitive configuration" >> security-summary.md
        echo "- 🔄 Enable automated security patching" >> security-summary.md
        
        cat security-summary.md

    - name: 📤 Upload security summary
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-summary
        path: security-summary.md

    - name: 🔔 Notify on security issues
      if: failure() || (contains(needs.*.result, 'failure'))
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      run: |
        if [ ! -z "$SLACK_WEBHOOK_URL" ]; then
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"🚨 Security scan found issues in Job Queue System! Please review the security reports."}' \
            $SLACK_WEBHOOK_URL
        fi