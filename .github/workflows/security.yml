name: 🛡️ Security Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    # Run security scan weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Python Security Scan
  python-security:
    name: 🐍 Python Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 📦 Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety pip-audit

    - name: 🔍 Run Bandit security scan
      working-directory: ./backend
      run: |
        bandit -r app/ -f json -o bandit-report.json || echo "Bandit scan completed with warnings"
        
    - name: 🔍 Check for known vulnerabilities with Safety
      working-directory: ./backend
      run: |
        safety check --json --output safety-report.json || echo "Safety scan completed with warnings"

    - name: 🔍 Run pip-audit
      working-directory: ./backend
      run: |
        pip-audit --format=json --output=pip-audit-report.json || echo "pip-audit completed with warnings"

    - name: 📊 Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-python
        path: |
          backend/bandit-report.json
          backend/safety-report.json
          backend/pip-audit-report.json

  # Node.js Security Scan
  nodejs-security:
    name: ⚛️ Node.js Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: 🔍 Frontend npm audit
      working-directory: ./frontend
      run: |
        if [ -f package.json ]; then
          npm audit --audit-level=moderate --json > npm-audit-frontend.json || echo "::warning::NPM audit completed with warnings. Check the audit logs."
        else
          echo "::error::No package.json found in frontend. Skipping audit."
        fi

    - name: 🔍 Infrastructure npm audit
      working-directory: ./aws/infrastructure
      run: |
        if [ -f package.json ]; then
          npm audit --audit-level=moderate --json > npm-audit-infrastructure.json || echo "::warning::NPM audit completed with warnings. Check the audit logs."
        else
          echo "::error::No package.json found in infrastructure. Skipping audit."
        fi

    - name: 📊 Upload security reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports-nodejs
        path: |
          frontend/npm-audit-frontend.json
          aws/infrastructure/npm-audit-infrastructure.json

  # Secrets Scanning
  secrets-scan:
    name: 🔑 Secrets Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🔍 Run gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Security Summary
  security-summary:
    name: 📋 Security Summary
    runs-on: ubuntu-latest
    needs: [python-security, nodejs-security, secrets-scan]
    if: always()
    
    steps:
    - name: 📊 Report Results
      run: |
        echo "🛡️ Security Scan Summary"
        echo "======================="
        echo "Python Security: ${{ needs.python-security.result }}"
        echo "Node.js Security: ${{ needs.nodejs-security.result }}"
        echo "Secrets Scan: ${{ needs.secrets-scan.result }}"
        echo ""
        echo "✅ Security scans completed successfully!"
        echo "📊 Check the uploaded artifacts for detailed reports."