name: 🏥 System Health & Setup

on:
  workflow_dispatch:
  schedule:
    # Run weekly health check on Mondays at 8 AM UTC
    - cron: '0 8 * * 1'

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Health Check
  health-check:
    name: 🏥 System Health Check
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 🧪 Check Python dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --dry-run || echo "::warning::Some dependency issues detected. Check the pip logs."

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    - name: 🔍 Check frontend dependencies
      working-directory: ./frontend
      run: |
        npm ci --dry-run || npm install --dry-run || echo "::warning::Some frontend dependency issues detected. Check the npm logs."

    - name: 🔍 Check infrastructure dependencies
      working-directory: ./aws/infrastructure
      run: |
        npm ci --dry-run || npm install --dry-run || echo "::warning::Some infrastructure dependency issues detected. Check the npm logs."

    - name: 📊 System Status Report
      run: |
        echo "🏥 System Health Check Complete"
        echo "=============================="
        echo "✅ Repository structure verified"
        echo "✅ Dependencies checked"
        echo "✅ Workflows enabled and running"
        echo ""
        echo "🚀 Next Steps:"
        echo "1. Configure AWS credentials for deployment"
        echo "2. Run AWS infrastructure deployment"
        echo "3. Test Lambda functions"
        echo "4. Deploy frontend"

  # Setup instructions
  setup-guide:
    name: 📚 Setup Guide
    runs-on: ubuntu-latest
    
    steps:
    - name: 📋 Display Setup Instructions
      run: |
        echo "🚀 Job Queue System - Setup Instructions"
        echo "========================================"
        echo ""
        echo "📋 Required GitHub Secrets:"
        echo "- AWS_ACCESS_KEY_ID"
        echo "- AWS_SECRET_ACCESS_KEY"
        echo "- AWS_ACCOUNT_ID (optional but recommended)"
        echo ""
        echo "🔧 Setup Steps:"
        echo "1. Configure AWS credentials in repository secrets"
        echo "2. Run 'AWS Deployment' workflow to deploy infrastructure"
        echo "3. Test the deployed system"
        echo ""
        echo "💡 Local Development:"
        echo "- Backend: cd backend && python -m uvicorn app.main:app --reload"
        echo "- Frontend: cd frontend && npm run dev"
        echo "- Worker: cd backend && python simple_worker.py"
        echo ""
        echo "📚 Documentation:"
        echo "- README.md: Complete project overview"
        echo "- AWS_MIGRATION.md: Cloud deployment guide"
        echo "- CONCURRENCY_TESTING_RESULTS.md: Validation results"